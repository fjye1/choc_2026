{% extends 'base/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3">
            <div class="list-group">

                <a href="{{ url_for('admin.dashboard') }}" class="list-group-item list-group-item-action">Admin Home</a>
                <a href="{{ url_for('admin.create_shipment') }}" class="list-group-item list-group-item-action">Create Shipments</a>
                <a href="{{ url_for('admin.view_shipments') }}" class="list-group-item list-group-item-action">View Shipments</a>
                <a href="{{ url_for('admin.create_product') }}" class="list-group-item list-group-item-action">Create Product</a>
                <a href="{{ url_for('admin.view_product') }}" class="list-group-item list-group-item-action">View Product</a>

                <a href="{{ url_for('admin.admin_cart') }}" class="list-group-item list-group-item-action">Admin Cart</a>

                <a href="{{ url_for('admin.archive') }}" class="list-group-item list-group-item-action">Order Archive</a>
                <a href="{{ url_for('admin.admin_users') }}" class="list-group-item list-group-item-action">Users</a>
                <a href="{{ url_for('admin.support') }}" class="list-group-item list-group-item-action">Support</a>
                <a href="{{ url_for('admin.settings') }}" class="list-group-item list-group-item-action">Settings</a>
                <a href="{{ url_for('auth.logout') }}" class="list-group-item list-group-item-action">Logout</a>
            </div>
        </div>

        <!-- Admin Content -->
        <div class="col-md-9">
            {% block admin_block %}{% endblock %}
        </div>

    </div>
</div>
{% endblock %}
