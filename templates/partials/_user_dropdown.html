{% if current_user.is_authenticated %}
<div class="dropdown d-none d-lg-block">
    <a href="#" class="d-block text-decoration-none dropdown-toggle"
       data-bs-toggle="dropdown" aria-expanded="false">
        <img src="{{ current_user.email | gravatar }}"
             alt="Profile"
             width="40"
             height="40"
             class="rounded-circle">
    </a>
    <ul class="dropdown-menu dropdown-menu-end text-small">
        <li><a class="dropdown-item" href="{{ url_for('profile.profile') }}">Profile</a></li>
        <!--                        TODO update the routes for profile_orders and profile_price_alert-->
        <li><a class="dropdown-item" href="{{ url_for('profile.profile') }}">Orders</a></li>
        <li><a class="dropdown-item" href="{{ url_for('profile.profile') }}">Price
            alerts</a></li>
        <li>
            <hr class="dropdown-divider">
        </li>
        <li><a class="dropdown-item" href="{{ url_for('auth.logout') }}">Sign out</a></li>
    </ul>
</div>
{% endif %}
