{% if current_user.is_authenticated %}
    {% if user_alert %}
        <div class="alert alert-success">
            Price alert set at ₹{{ '%.2f' % user_alert.target_price }}
        </div>
    {% else %}
        <form method="POST" action="{{ url_for('product.set_price_alert') }}">
            <label for="target_price">Notify me if price drops to ₹:</label>
            <input type="number" id="target_price" name="target_price"
                   min="{{ product.price_floor | default(0) }}" step="0.01" required>
            <input type="hidden" name="product_id" value="{{ product.id }}">
            <button class="btn btn-success" type="submit">Notify Me</button>
        </form>
    {% endif %}
{% endif %}
