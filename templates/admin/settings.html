{% extends "admin/admin_base.html" %}
{% block title %}Admin Settings{% endblock %}

{% block admin_block %}

<div class="container mt-4">

<h1 class="mb-4">Site Settings</h1>

<form>

<!-- Dynamic Pricing -->
<div class="card mb-4 shadow-sm">
<div class="card-header">
<h5 class="mb-0">Dynamic Pricing</h5>
</div>
<div class="card-body">

<div class="form-check form-switch mb-3">
<input class="form-check-input" type="checkbox" id="dynamicPricing">
<label class="form-check-label" for="dynamicPricing">
Enable dynamic pricing
</label>
</div>

<div class="row g-3">
<div class="col-md-4">
<label class="form-label">Default floor price (%)</label>
<input type="number" class="form-control" placeholder="60">
</div>



<div class="col-md-4">
<label class="form-label">Price update interval (minutes)</label>
<input type="number" class="form-control" placeholder="60">
</div>
</div>

</div>
</div>


<!-- Orders & Shipping -->
<div class="card mb-4 shadow-sm">
<div class="card-header">
<h5 class="mb-0">Orders & Shipping</h5>
</div>
<div class="card-body">

<div class="row g-3">

<div class="col-md-4">
<label class="form-label">Auto cancel unpaid orders (minutes)</label>
<input type="number" class="form-control" placeholder="30">
</div>

<div class="col-md-4">
<label class="form-label">Flat shipping price (£)</label>
<input type="number" class="form-control" placeholder="4.99">
</div>

<div class="col-md-4">
<label class="form-label">Free shipping over (£)</label>
<input type="number" class="form-control" placeholder="40">
</div>

</div>

</div>
</div>


<!-- Alerts -->
<div class="card mb-4 shadow-sm">
<div class="card-header">
<h5 class="mb-0">Price Alerts</h5>
</div>
<div class="card-body">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Default alert expiry (days)</label>
<input type="number" class="form-control" placeholder="14">
</div>

<div class="col-md-6">
<label class="form-label">Maximum alerts per user</label>
<input type="number" class="form-control" placeholder="10">
</div>

</div>

</div>
</div>


<!-- Product Defaults -->
<div class="card mb-4 shadow-sm">
<div class="card-header">
<h5 class="mb-0">Product Defaults</h5>
</div>
<div class="card-body">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Default shelf life (days)</label>
<input type="number" class="form-control" placeholder="30">
</div>

<div class="col-md-6">
<label class="form-label">Low stock warning threshold</label>
<input type="number" class="form-control" placeholder="10">
</div>

</div>

</div>
</div>


<!-- System Controls -->
<div class="card mb-4 shadow-sm border-warning">
<div class="card-header bg-warning-subtle">
<h5 class="mb-0">System Controls</h5>
</div>
<div class="card-body">

<div class="form-check form-switch mb-2">
<input class="form-check-input" type="checkbox" id="maintenance">
<label class="form-check-label" for="maintenance">
Maintenance mode
</label>
</div>

<div class="form-check form-switch mb-2">
<input class="form-check-input" type="checkbox" id="disableCheckout">
<label class="form-check-label" for="disableCheckout">
Disable checkout
</label>
</div>

<div class="form-check form-switch">
<input class="form-check-input" type="checkbox" id="disableRegistration">
<label class="form-check-label" for="disableRegistration">
Disable new registrations
</label>
</div>

</div>
</div>


<!-- Email Settings -->
<div class="card mb-4 shadow-sm">
<div class="card-header">
<h5 class="mb-0">Email Notifications</h5>
</div>
<div class="card-body">

<div class="form-check form-switch mb-2">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
Send order confirmation emails
</label>
</div>

<div class="form-check form-switch mb-2">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
Send shipping notifications
</label>
</div>

<div class="form-check form-switch">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
Send low stock alerts
</label>
</div>

</div>
</div>


<div class="text-end">
<button class="btn btn-primary" disabled>Save Settings (Coming Soon)</button>
</div>

</form>

</div>

{% endblock %}
