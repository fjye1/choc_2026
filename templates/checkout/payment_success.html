{% extends "base/base.html" %}
{% block content %}
<div class="container text-center mt-5">
    <h1 class="text-success">Payment Successful 🎉</h1>
    <p>Thank you for your order!</p>
    <a href="{{ url_for('home.index') }}" class="btn btn-primary mt-3">Return to Home</a>

{% endblock %}
