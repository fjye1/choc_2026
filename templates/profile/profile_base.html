{% extends 'base/base.html' %}
{% block extra_css %}<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/profile.css') }}">{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-3">
            <div class="list-group">
                <a href="{{ url_for('profile.profile') }}" class="list-group-item list-group-item-action">Profile</a>
                <a href="{{ url_for('profile.profile_orders') }}" class="list-group-item list-group-item-action">Orders</a>
                <a href="{{ url_for('profile.profile_price_alerts') }}" class="list-group-item list-group-item-action">Price alerts</a>
                <a href="{{ url_for('profile.profile_addresses') }}" class="list-group-item list-group-item-action">Addresses</a>
                <a href="{{ url_for('auth.logout') }}" class="list-group-item list-group-item-action">Logout</a>
            </div>
        </div>

        <!-- Page content -->
        <div class="col-md-9">
            {% block profile_block %}{% endblock %}
        </div>

    </div>
</div>
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
