{% if can_comment %}
<form method="POST" class="mt-4">
    {{ form.hidden_tag() }}
    <label for="rating">Rating:</label>
    <input type="range" id="rating" name="rating" min="1" max="5" value="3" oninput="updateStars(this.value)">
    <div id="stars">⭐⭐⭐☆☆</div>
    {{ form.comment_text(class="form-control") }}
    <button type="submit" class="btn btn-primary mt-2">Submit</button>
</form>
{% endif %}

<div class="mt-4">
    {% for comment in product.comments %}
        <div class="comment">
            <strong>{{ comment.user.name }}</strong> ⭐{{ comment.rating }}
            <p>{{ comment.comment|safe }}</p>
        </div>
    {% endfor %}
</div>
